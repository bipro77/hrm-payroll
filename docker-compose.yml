version: "3.8"

services:

  db:
    image: postgres:16.2
    container_name: hrm-db
    restart: always

    environment:
      POSTGRES_DB: hrm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 00000000

    ports:
      - "5432:5432"

    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: hrm-backend

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hrm_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 00000000

    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: hrm-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

volumes:
  db_data: